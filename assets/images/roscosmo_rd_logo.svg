<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROSCOSMO R&D Logo</title>
  <style>
    :root {
      --bg: #000000;
      --orange: #f59a2f;
      --blue: #3f73e8;
      --white: #f3f1ea;
    }
    html, body {
      margin: 0;
      background: var(--bg);
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: monospace;
    }
    .wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
    }
    svg {
      width: min(1200px, 96vw);
      height: auto;
      image-rendering: pixelated;
      shape-rendering: crispEdges;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROSCOSMO R&D pixel logo">
      <defs>
        <style>
          .px { shape-rendering: crispEdges; }
        </style>
      </defs>

      <rect x="0" y="0" width="1200" height="700" fill="#000000"/>

      <!-- stars -->
      <g fill="#f3f1ea" class="px" opacity="0.95">
        <rect x="130" y="170" width="8" height="8"/>
        <rect x="185" y="210" width="8" height="8"/>
        <rect x="245" y="140" width="16" height="16"/>
        <rect x="915" y="150" width="16" height="16"/>
        <rect x="980" y="205" width="8" height="8"/>
        <rect x="1040" y="175" width="8" height="8"/>
        <rect x="160" y="470" width="16" height="16"/>
        <rect x="250" y="520" width="8" height="8"/>
        <rect x="970" y="485" width="16" height="16"/>
        <rect x="1070" y="440" width="8" height="8"/>
      </g>

      <!-- planet arc behind center -->
      <g fill="#f3f1ea" class="px" opacity="0.95">
        <rect x="495" y="110" width="30" height="10"/>
        <rect x="470" y="120" width="25" height="10"/>
        <rect x="525" y="120" width="25" height="10"/>
        <rect x="445" y="130" width="25" height="10"/>
        <rect x="550" y="130" width="25" height="10"/>
        <rect x="425" y="140" width="20" height="10"/>
        <rect x="575" y="140" width="20" height="10"/>
        <rect x="405" y="150" width="20" height="10"/>
        <rect x="595" y="150" width="20" height="10"/>
        <rect x="390" y="160" width="15" height="10"/>
        <rect x="615" y="160" width="15" height="10"/>
        <rect x="375" y="170" width="15" height="10"/>
        <rect x="630" y="170" width="15" height="10"/>
        <rect x="365" y="180" width="10" height="10"/>
        <rect x="645" y="180" width="10" height="10"/>
        <rect x="355" y="190" width="10" height="10"/>
        <rect x="655" y="190" width="10" height="10"/>
      </g>

      <!-- orbit ring behind lower center -->
      <g fill="#f3f1ea" class="px" opacity="0.95">
        <rect x="360" y="430" width="25" height="10"/>
        <rect x="335" y="440" width="35" height="10"/>
        <rect x="315" y="450" width="30" height="10"/>
        <rect x="300" y="460" width="25" height="10"/>
        <rect x="290" y="470" width="20" height="10"/>
        <rect x="285" y="480" width="15" height="10"/>
        <rect x="290" y="490" width="20" height="10"/>
        <rect x="305" y="500" width="25" height="10"/>
        <rect x="330" y="510" width="35" height="10"/>
        <rect x="365" y="520" width="55" height="10"/>

        <rect x="405" y="520" width="40" height="10"/>
        <rect x="445" y="510" width="40" height="10"/>
        <rect x="485" y="500" width="45" height="10"/>
        <rect x="530" y="490" width="45" height="10"/>
        <rect x="575" y="480" width="45" height="10"/>
        <rect x="620" y="470" width="40" height="10"/>
        <rect x="660" y="460" width="35" height="10"/>
        <rect x="695" y="450" width="30" height="10"/>
        <rect x="725" y="440" width="20" height="10"/>

        <rect x="470" y="420" width="15" height="10"/>
        <rect x="485" y="430" width="20" height="10"/>
        <rect x="505" y="440" width="20" height="10"/>
      </g>

      <!-- WORDMARK built from 10x10 pixel cells -->
      <g id="wordmark" class="px">
        <!-- R -->
        <g transform="translate(90,240)" fill="#f59a2f">
          <rect x="0" y="0" width="20" height="100"/>
          <rect x="20" y="0" width="50" height="20"/>
          <rect x="70" y="20" width="20" height="20"/>
          <rect x="20" y="40" width="50" height="20"/>
          <rect x="70" y="60" width="20" height="20"/>
          <rect x="40" y="60" width="30" height="20"/>
          <rect x="50" y="80" width="20" height="20"/>
          <rect x="70" y="80" width="20" height="20"/>
        </g>

        <!-- O -->
        <g transform="translate(190,240)" fill="#f59a2f">
          <rect x="20" y="0" width="50" height="20"/>
          <rect x="0" y="20" width="20" height="60"/>
          <rect x="70" y="20" width="20" height="60"/>
          <rect x="20" y="80" width="50" height="20"/>
        </g>

        <!-- S -->
        <g transform="translate(290,240)" fill="#f59a2f">
          <rect x="20" y="0" width="60" height="20"/>
          <rect x="0" y="20" width="20" height="20"/>
          <rect x="20" y="40" width="50" height="20"/>
          <rect x="70" y="60" width="20" height="20"/>
          <rect x="10" y="80" width="60" height="20"/>
        </g>

        <!-- C -->
        <g transform="translate(390,240)" fill="#f59a2f">
          <rect x="20" y="0" width="60" height="20"/>
          <rect x="0" y="20" width="20" height="60"/>
          <rect x="20" y="80" width="60" height="20"/>
        </g>

        <!-- O (shared overlap pivot) -->
        <g transform="translate(490,240)" fill="#f59a2f">
          <rect x="20" y="0" width="50" height="20"/>
          <rect x="0" y="20" width="20" height="60"/>
          <rect x="70" y="20" width="20" height="60"/>
          <rect x="20" y="80" width="50" height="20"/>
        </g>

        <!-- S -->
        <g transform="translate(590,240)" fill="#3f73e8">
          <rect x="20" y="0" width="60" height="20"/>
          <rect x="0" y="20" width="20" height="20"/>
          <rect x="20" y="40" width="50" height="20"/>
          <rect x="70" y="60" width="20" height="20"/>
          <rect x="10" y="80" width="60" height="20"/>
        </g>

        <!-- M -->
        <g transform="translate(690,240)" fill="#3f73e8">
          <rect x="0" y="0" width="20" height="100"/>
          <rect x="70" y="0" width="20" height="100"/>
          <rect x="20" y="20" width="20" height="20"/>
          <rect x="50" y="20" width="20" height="20"/>
          <rect x="40" y="40" width="10" height="20"/>
        </g>

        <!-- O -->
        <g transform="translate(790,240)" fill="#3f73e8">
          <rect x="20" y="0" width="50" height="20"/>
          <rect x="0" y="20" width="20" height="60"/>
          <rect x="70" y="20" width="20" height="60"/>
          <rect x="20" y="80" width="50" height="20"/>
        </g>
      </g>

      <!-- R&D -->
      <g class="px" fill="#f3f1ea">
        <rect x="390" y="610" width="70" height="10"/>
        <rect x="740" y="610" width="70" height="10"/>

        <!-- R -->
        <g transform="translate(500,560)">
          <rect x="0" y="0" width="10" height="50"/>
          <rect x="10" y="0" width="20" height="10"/>
          <rect x="30" y="10" width="10" height="10"/>
          <rect x="10" y="20" width="20" height="10"/>
          <rect x="20" y="30" width="10" height="10"/>
          <rect x="30" y="30" width="10" height="10"/>
        </g>

        <!-- & -->
        <g transform="translate(550,560)">
          <rect x="10" y="0" width="20" height="10"/>
          <rect x="0" y="10" width="10" height="10"/>
          <rect x="20" y="10" width="10" height="10"/>
          <rect x="10" y="20" width="10" height="10"/>
          <rect x="20" y="30" width="10" height="10"/>
          <rect x="30" y="20" width="10" height="10"/>
          <rect x="0" y="40" width="10" height="10"/>
          <rect x="10" y="40" width="20" height="10"/>
          <rect x="30" y="40" width="10" height="10"/>
        </g>

        <!-- D -->
        <g transform="translate(610,560)">
          <rect x="0" y="0" width="10" height="50"/>
          <rect x="10" y="0" width="20" height="10"/>
          <rect x="30" y="10" width="10" height="30"/>
          <rect x="10" y="40" width="20" height="10"/>
        </g>
      </g>
    </svg>
  </div>
</body>
</html>
