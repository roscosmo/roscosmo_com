<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roscosmo Studio</title>
    <meta
      name="description"
      content="Roscosmo Studio builds practical, playful product design, electronics, and fabrication work."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&family=Syne:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      document.documentElement.classList.add("has-js");
      try {
        const savedPreset = localStorage.getItem("roscosmo-theme-preset");
        const savedOverrides = localStorage.getItem("roscosmo-theme-overrides");
        if (savedPreset) {
          document.documentElement.dataset.theme = savedPreset;
        }
        if (savedOverrides) {
          const overrides = JSON.parse(savedOverrides);
          Object.keys(overrides).forEach((token) => {
            document.documentElement.style.setProperty(token, overrides[token]);
          });
        }
      } catch (error) {
        console.warn("Theme preview could not be restored.", error);
      }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body class="page-intro" data-page="intro">
    <main id="main" class="intro" data-intro-stage>
      <div class="intro__grid" aria-hidden="true"></div>
      <div class="intro__orb intro__orb--one" data-depth="1.4" aria-hidden="true"></div>
      <div class="intro__orb intro__orb--two" data-depth="0.9" aria-hidden="true"></div>
      <div class="intro__orb intro__orb--three" data-depth="1.2" aria-hidden="true"></div>

      <section class="intro__panel" data-depth="0.45">
        <p class="eyebrow eyebrow--light">Independent Design Practice</p>
        <h1>Roscosmo Studio</h1>
        <p class="lead lead--light">
          Industrial design, electronics, fabrication, and experimental product
          development.
        </p>
        <div class="button-row">
          <a class="button-link" href="home.html">Enter</a>
        </div>
      </section>
    </main>
  </body>
</html>
